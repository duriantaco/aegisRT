target:
  type: openai_compat
  url: "http://localhost:8000/v1/chat/completions"
  timeout_seconds: 30
  params:
    model: "your-model-name"

probes:
  - id: jailbreak_templates
    family: injection
    generator: dataset
    detectors: [regex, policy]
    severity: high

  - id: harmbench_suite
    family: harm
    generator: dataset
    detectors: [regex, policy]
    severity: critical

  - id: dan_variants
    family: injection
    generator: dataset
    detectors: [regex, policy]
    severity: high

  - id: multilingual_attacks
    family: multilingual
    generator: dataset
    detectors: [regex, policy]
    severity: high

runtime:
  concurrency: 4
  rate_limit_per_minute: 60
  max_cost_usd: 10.00

report:
  formats: [terminal, json, html]
  output_dir: .aegisrt
  fail_on:
    severity: high
    min_confidence: 0.7
